<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL DARK THEME
========================= */

body.dark-body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
    background: #0b1220; /* deeper unified dark */
    overflow: hidden;
    position: relative;
}

/* animated gradient overlay */
body.dark-body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, #1e3a8a33, transparent 40%),
                radial-gradient(circle at 80% 80%, #7c3aed33, transparent 40%);
    z-index: 0;
}

/* floating blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.35;
    animation: float 12s infinite ease-in-out;
    z-index: 0;
}

.b1 {
    width: 320px;
    height: 320px;
    background: #3b82f6;
    top: -100px;
    left: -100px;
}

.b2 {
    width: 380px;
    height: 380px;
    background: #a855f7;
    bottom: -120px;
    right: -120px;
    animation-delay: 2s;
}

@keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(25px); }
}

/* canvas particles */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
}

/* =========================
   LOGIN CARD
========================= */

.login-container {
    width: 100%;
    max-width: 420px;
    padding: 32px;
    border-radius: 18px;

    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);

    box-shadow: 0 25px 70px rgba(0,0,0,0.6);
    z-index: 2;
    position: relative;

    animation: popIn 0.6s ease;
}

@keyframes popIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* =========================
   TEXT STYLES
========================= */

.title {
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    color: #ffffff;
}

.subtitle {
    font-size: 13px;
    text-align: center;
    color: #94a3b8;
    margin-bottom: 12px;
}

.live-text {
    text-align: center;
    font-size: 13px;
    color: #60a5fa;
    margin-bottom: 14px;
    min-height: 18px;
}

.system-info {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #94a3b8;
    margin-bottom: 14px;
}

/* =========================
   INPUTS
========================= */

input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 10px;

    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;

    outline: none;
    transition: 0.2s;
}

input:focus, select:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

input::placeholder {
    color: #94a3b8;
}

select option {
    color: black;
}

/* =========================
   BUTTONS
========================= */

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;

    background: linear-gradient(135deg, #2563eb, #7c3aed);
    color: white;
    font-weight: 600;

    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 25px rgba(124,58,237,0.3);
}

.btn-success {
    border-radius: 10px;
    font-weight: 600;
}

/* =========================
   ERROR TEXT
========================= */

.error-text {
    color: #f87171;
    text-align: center;
    font-size: 13px;
    margin-top: 10px;
}

</style>
</head>

<body class="dark-body">

<!-- BACKGROUND EFFECTS -->
<div class="blob b1"></div>
<div class="blob b2"></div>
<canvas id="particles"></canvas>

<div class="login-container">

    <h2 class="title">Welcome Back</h2>
    <p class="subtitle">Login to your dashboard</p>

    <div class="live-text" id="liveText">
        Secure • Modern • Role Based System
    </div>

    <div class="system-info">
        <span>⚡ API Ready</span>
        <span>🔒 Secure</span>
        <span>🟢 Online</span>
    </div>

    <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
        <option value="admin">Admin</option>
    </select>

    <input type="text" id="username" placeholder="Enter username">
    <input type="password" id="password" placeholder="Enter password">

    <button onclick="login()">Login</button>

    <a href="signup.html" class="btn btn-success w-100 mt-3">
        Create New Account
    </a>

    <p id="error" class="error-text"></p>

</div>

<script>
const BASE_URL = "http://127.0.0.1:8081";

/* rotating text */
const messages = [
    "Secure • Modern • Role Based System",
    "Built for Students • Teachers • Admins",
    "JWT Authentication Enabled",
    "Fast & Lightweight Dashboard"
];

let i = 0;
setInterval(() => {
    document.getElementById("liveText").innerText = messages[i];
    i = (i + 1) % messages.length;
}, 2500);

/* particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 50; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: Math.random() - 0.5,
        dy: Math.random() - 0.5
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.4)";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(animate);
}
animate();

/* login */
async function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;

    const errorBox = document.getElementById("error");
    errorBox.innerText = "";

    if (!username || !password) {
        errorBox.innerText = "Username and password required";
        return;
    }

    try {

        const res = await fetch(BASE_URL + "/api/token/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.access) {

            localStorage.setItem("token", data.access);
            localStorage.setItem("role", role);

            if (role === "student") window.location.href = "student-dashboard.html";
            else if (role === "teacher") window.location.href = "teacher-dashboard.html";
            else window.location.href = "admin-dashboard.html";

        } else {
            errorBox.innerText = data.detail || "Login failed";
        }

    } catch (err) {
        errorBox.innerText = "Server not responding";
    }
}
</script>

</body>
</html>
