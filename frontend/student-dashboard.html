<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#05070d;
color:#e2e8f0;
}

.sidebar{
width:240px;
height:100vh;
position:fixed;
background:#0a0f1c;
border-right:1px solid rgba(255,255,255,0.05);
padding:20px;
}

.sidebar a{
display:block;
padding:10px;
color:#94a3b8;
text-decoration:none;
border-radius:8px;
margin-bottom:5px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.05);
color:white;
}

.main{
margin-left:240px;
padding:25px;
}

.card-box{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
transition:0.3s;
}

.card-box:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.05);
}

.clickable-card{cursor:pointer;}
</style>
</head>

<body>

<div class="sidebar">
<h4>Student Panel</h4>
<a href="#" onclick="showSection('dashboardSection')">Dashboard</a>
<a href="#" onclick="showSection('assignmentsSection')">Assignments</a>
<a href="#" onclick="showSection('submissionsSection')">Submissions</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<div id="dashboardSection">
<h2>Student Dashboard</h2>

<div class="row">

<div class="col-md-4">
<div class="card-box clickable-card">
<h5>Assignments</h5>
<p id="totalAssignments">0</p>
</div>
</div>

<div class="col-md-4">
<div class="card-box clickable-card">
<h5>Pending</h5>
<p id="pending">0</p>
</div>
</div>

<div class="col-md-4">
<div class="card-box clickable-card">
<h5>Submitted</h5>
<p id="submitted">0</p>
</div>
</div>

</div>
</div>

<div id="assignmentsSection" style="display:none">
<h3>Assignments</h3>
<div id="assignments" class="row"></div>
</div>

<div id="submissionsSection" style="display:none">
<h3>Submissions</h3>
<div id="submissions"></div>
</div>

</div>

<script src="js/student.js"></script>

</body>
</html>
