<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#05070d;
color:#e2e8f0;
}

.sidebar{
width:240px;
height:100vh;
position:fixed;
background:#0a0f1c;
padding:20px;
border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar a{
display:block;
padding:10px;
color:#94a3b8;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{background:rgba(255,255,255,0.05);color:white;}

.main{margin-left:240px;padding:25px;}

.card-box{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
}
</style>
</head>

<body>

<div class="sidebar">
<h4>Teacher Panel</h4>
<a href="#" onclick="showSection('dashboardSection')">Dashboard</a>
<a href="#" onclick="showSection('assignmentsSection')">Assignments</a>
<a href="#" onclick="showSection('submissionsSection')">Submissions</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<div id="dashboardSection">
<h2>Teacher Dashboard</h2>

<div class="row">

<div class="col-md-4">
<div class="card-box">
<h5>Assignments</h5>
<p id="totalAssignments">0</p>
</div>
</div>

<div class="col-md-4">
<div class="card-box">
<h5>Pending Reviews</h5>
<p id="pending">0</p>
</div>
</div>

<div class="col-md-4">
<div class="card-box">
<h5>Students</h5>
<p id="students">0</p>
</div>
</div>

</div>
</div>

<div id="assignmentsSection" style="display:none">
<h3>Create Assignment</h3>

<input id="title" class="form-control mb-2" placeholder="Title">
<input id="description" class="form-control mb-2" placeholder="Description">
<input id="deadline" type="date" class="form-control mb-2">
<input id="total_marks" type="number" class="form-control mb-2">

<button onclick="createAssignment()" class="btn btn-primary">
Create
</button>

</div>

<div id="submissionsSection" style="display:none">
<h3>Submissions</h3>
<div id="submissions"></div>
</div>

</div>

<script src="js/teacher.js"></script>

</body>
</html>
